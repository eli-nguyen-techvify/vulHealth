services:
  backend:
    build: ./backend
    container_name: vulhealth-backend
    environment:
      - PORT=1208
      - JWT_SECRET=secret
      - NODE_ENV=development
    ports:
      - "1208:1208"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vulhealth-frontend
    environment:
      - BACKEND_URL=http://backend:1208
    ports:
      - "8120:8120"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - backend
    restart: unless-stopped
