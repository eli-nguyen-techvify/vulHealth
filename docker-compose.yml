services:
  backend:
    build: ./backend
    container_name: vulhealth-backend
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env or shell environment}
      - NODE_ENV=${NODE_ENV:-development}
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vulhealth-frontend
    environment:
      - BACKEND_URL=http://backend:3001
    ports:
      - "4000:4000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - backend
    restart: unless-stopped
